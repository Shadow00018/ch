<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Community Universe</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
    /* ================================================= */
    /* RESET */
    /* ================================================= */
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    html{
        scroll-behavior:smooth;
    }

    body{
        background:#020202;
        color:white;
        overflow-x:hidden;
        font-family:'Inter',sans-serif;
    }

    /* ================================================= */
    /* WEBGL */
    /* ================================================= */
    #bg{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        z-index:-5;
        display: block;
    }

    /* ================================================= */
    /* NOISE */
    /* ================================================= */
    .noise{
        position:fixed;
        inset:0;
        background-image:url('https://grainy-gradients.vercel.app/noise.svg');
        opacity:0.05;
        pointer-events:none;
        z-index:99999;
    }

    /* ================================================= */
    /* CURSOR */
    /* ================================================= */
    .cursor{
        width:30px;
        height:30px;
        border:2px solid white;
        border-radius:50%;
        position:fixed;
        pointer-events:none;
        transform:translate(-50%,-50%);
        z-index:999999;
        mix-blend-mode:difference;
    }

    /* ================================================= */
    /* NAVBAR */
    /* ================================================= */
    nav{
        position:fixed;
        top:0;
        width:100%;
        padding:30px 6%;
        display:flex;
        justify-content:space-between;
        align-items:center;
        z-index:1000;
    }

    .logo{
        font-family:'Orbitron',sans-serif;
        font-size:28px;
        font-weight:900;
        letter-spacing:4px;
    }

    nav ul{
        display:flex;
        gap:45px;
        list-style:none;
    }

    nav ul li a{
        color:white;
        text-decoration:none;
        opacity:0.7;
        transition:0.3s;
    }

    nav ul li a:hover{
        opacity:1;
    }

    /* ================================================= */
    /* HERO */
    /* ================================================= */
    .hero{
        min-height:100vh;
        position:relative;
        display:flex;
        justify-content:center;
        align-items:center;
        overflow:hidden;
    }

    /* GLOW */
    .glow{
        position:absolute;
        width:700px;
        height:700px;
        border-radius:50%;
        background:#6f00ff22;
        filter:blur(120px);
        animation:rotateGlow 12s linear infinite;
    }

    @keyframes rotateGlow{
        0%{ transform:rotate(0deg) scale(1); }
        50%{ transform:rotate(180deg) scale(1.2); }
        100%{ transform:rotate(360deg) scale(1); }
    }

    /* HERO CONTENT */
    .hero-content{
        position:relative;
        z-index:5;
        width:90%;
        text-align:center;
    }

    /* TAG */
    .tag{
        display:inline-block;
        padding:12px 25px;
        border-radius:100px;
        border:1px solid rgba(255,255,255,0.12);
        backdrop-filter:blur(20px);
        margin-bottom:40px;
        font-size:13px;
        letter-spacing:3px;
    }

    /* TITLE */
    .hero h1{
        font-size:10vw;
        line-height:0.85;
        text-transform:uppercase;
        font-weight:900;
        font-family:'Orbitron',sans-serif;
    }

    .hero h1 span{
        color:#8f5cff;
        text-shadow:0 0 40px #8f5cff;
    }

    /* TEXT */
    .hero p{
        max-width:800px;
        margin:40px auto;
        color:#bbb;
        line-height:1.9;
        font-size:18px;
    }

    /* BUTTONS */
    .buttons{
        display:flex;
        justify-content:center;
        gap:20px;
        flex-wrap:wrap;
    }

    .btn{
        padding:18px 45px;
        border-radius:100px;
        text-decoration:none;
        transition:0.4s;
        font-weight:600;
        position:relative;
        overflow:hidden;
    }

    .primary{
        background:white;
        color:black;
    }

    .primary:hover{
        transform:translateY(-5px) scale(1.05);
    }

    .secondary{
        border:1px solid rgba(255,255,255,0.15);
        color:white;
        backdrop-filter:blur(20px);
    }

    .secondary:hover{
        background:white;
        color:black;
    }

    /* ================================================= */
    /* FLOATING 3D CARDS */
    /* ================================================= */
    .cards-container{
        position:absolute;
        width:100%;
        height:100%;
        pointer-events:none;
    }

    /* CARD */
    .float-card{
        position:absolute;
        width:260px;
        height:320px;
        border-radius:35px;
        overflow:hidden;
        backdrop-filter:blur(25px);
        border:1px solid rgba(255,255,255,0.08);
        background:rgba(255,255,255,0.04);
        transform-style:preserve-3d;
        transition:0.3s;
        box-shadow:0 25px 60px rgba(0,0,0,0.5);
    }

    /* IMAGES */
    .float-card img{
        width:100%;
        height:100%;
        object-fit:cover;
        opacity:0.9;
    }

    /* POSITIONS */
    .card1{ top:15%; left:8%; animation:float1 7s ease-in-out infinite; }
    .card2{ top:20%; right:10%; animation:float2 6s ease-in-out infinite; }
    .card3{ bottom:10%; left:18%; animation:float3 8s ease-in-out infinite; }
    .card4{ bottom:8%; right:15%; animation:float4 9s ease-in-out infinite; }

    /* FLOAT ANIMATIONS */
    @keyframes float1{
        0%,100%{ transform:translateY(0px) rotate(-8deg); }
        50%{ transform:translateY(-30px) rotate(-4deg); }
    }

    @keyframes float2{
        0%,100%{ transform:translateY(0px) rotate(8deg); }
        50%{ transform:translateY(25px) rotate(4deg); }
    }

    @keyframes float3{
        0%,100%{ transform:translateY(0px) rotate(6deg); }
        50%{ transform:translateY(-20px) rotate(2deg); }
    }

    @keyframes float4{
        0%,100%{ transform:translateY(0px) rotate(-6deg); }
        50%{ transform:translateY(20px) rotate(-2deg); }
    }

    /* ================================================= */
    /* HUGE SECTION */
    /* ================================================= */
    .section{
        padding:200px 8%;
        position:relative;
    }

    /* TITLE */
    .big{
        font-size:8vw;
        line-height:0.9;
        text-transform:uppercase;
        font-weight:900;
        margin-bottom:80px;
        font-family:'Orbitron',sans-serif;
    }

    .big span{
        color:#8f5cff;
    }

    /* GRID */
    .grid{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
        gap:40px;
    }

    /* FEATURE */
    .feature{
        background:rgba(255,255,255,0.04);
        border:1px solid rgba(255,255,255,0.08);
        backdrop-filter:blur(20px);
        border-radius:35px;
        padding:50px;
        transition:0.5s;
        position:relative;
        overflow:hidden;
    }

    .feature::before{
        content:'';
        position:absolute;
        width:300px;
        height:300px;
        background:#8f5cff22;
        border-radius:50%;
        top:-150px;
        right:-150px;
        filter:blur(50px);
    }

    .feature:hover{
        transform:translateY(-15px) rotateX(5deg);
    }

    /* TEXT */
    .feature h2{
        font-size:38px;
        margin-bottom:20px;
    }

    .feature p{
        color:#bbb;
        line-height:1.9;
    }

    /* ================================================= */
    /* MARQUEE */
    /* ================================================= */
    .marquee{
        width:100%;
        overflow:hidden;
        white-space:nowrap;
        margin-top:140px;
    }

    .track{
        display:inline-block;
        animation:marquee 25s linear infinite;
    }

    .track span{
        font-size:8vw;
        margin-right:80px;
        font-weight:900;
        color:#151515;
        text-transform:uppercase;
    }

    @keyframes marquee{
        0%{ transform:translateX(0%); }
        1
